name: ProtocolLibbbb
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Force Java 21 target
        run: |
          sed -i 's/JavaLanguageVersion.of([0-9]*)/JavaLanguageVersion.of(21)/g' build.gradle.kts
          echo "--- Verifying ---"
          grep -i "languageversion" build.gradle.kts

      - name: Run gradle build lifecycle
        run: ./gradlew build shadowJar --no-daemon

      - name: Upload plugin file
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolLib-java21
          path: build/libs/ProtocolLib.jar
