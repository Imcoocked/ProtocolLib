name: Build ProtocolLib for Java 21
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ProtocolLib
        uses: actions/checkout@v4
        with:
          repository: dmulloy2/ProtocolLib
          ref: master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Force Java 21 target
        run: |
          sed -i 's/JavaVersion.VERSION_[0-9]*/JavaVersion.VERSION_21/g' build.gradle.kts
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_21/g' build.gradle.kts
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_21/g' build.gradle.kts
          cat build.gradle.kts | grep -i "version\|compat\|java" | head -20

      - name: Build with Gradle
        run: ./gradlew shadowJar -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolLib-java21
          path: build/libs/ProtocolLib*.jar
