name: Build ProtocolLib for Java 21
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ProtocolLib
        uses: actions/checkout@v4
        with:
          repository: dmulloy2/ProtocolLib
          ref: master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolLib-java21
          path: target/ProtocolLib.jar
